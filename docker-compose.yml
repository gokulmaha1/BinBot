version: '3.8'

services:
  binbot-pro:
    build: .
    container_name: binbot_pro_engine
    ports:
      - "80:8000"
    env_file:
      - .env
    volumes:
      - ./trade_bot.db:/app/trade_bot.db
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

volumes:
  db_data:
