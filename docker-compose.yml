version: '3.8'

services:
  binbot-pro:
    build: .
    container_name: binbot_pro_engine
    ports:
      - "8012:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

volumes:
  db_data:
