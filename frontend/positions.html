<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BinBot PRO | Active Positions</title>
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .positions-layout {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .position-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.5fr 3fr 1fr;
            gap: 1.5rem;
            align-items: center;
        }

        .position-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: var(--text-muted);
        }

        .position-card.long::before {
            background-color: var(--success);
        }

        .position-card.short::before {
            background-color: var(--danger);
        }

        .pos-info-block {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .pos-symbol {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pos-details-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }

        .pos-pnl-block {
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .pos-pnl-val {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .protection-input-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .protection-input-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .protection-input-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .protection-input-group input {
            padding: 0.4rem 0.6rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <!-- Sidebar Navigation Container -->
    <div id="sidebar-container"></div>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Top Status/Metric Header Container -->
        <div id="header-container"></div>

        <div class="positions-layout">
            <div class="card">
                <div class="card-title">
                    Active Futures Positions
                    <button id="btn-refresh-positions" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 6px;">
                        🔄 Refresh
                    </button>
                </div>
                
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.5rem;">
                    Monitor and adjust active take profit levels and stop loss constraints. The AI engine monitors these values dynamically every 5 seconds to adjust trailing stops and secure returns.
                </p>

                <div id="positions-list-container" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Active position cards dynamically rendered -->
                    <div style="text-align: center; color: var(--text-muted); padding: 3rem;">
                        Loading active positions...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Load Socket.IO, app.js, and page-specific JS -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/positions.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initializeLayout('positions');
        });
    </script>
</body>
</html>
